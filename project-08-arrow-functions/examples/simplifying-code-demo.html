<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simplifying Code Demo</title>
</head>
<body>

    <h1>Simplifying Your Code</h1>

    <script>
        // Example 1
        const quizScore1 = prompt("Please enter your quiz score:\n");

        // Convert user response to a number
        quizScore1 = parseFloat(quizScore1);
        
        const outputString = `The quiz score you entered was: ${quizScore1}`;
        console.log(outputString);

    </script>
    
</body>
</html>
