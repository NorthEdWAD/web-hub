<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREAMLINED JS Image Swap</title>
    <style>
        #model-frame {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="image-container">
        <h2>Mouse Over To Switch Images</h2>
        <img id="model-frame" src="coffee-shop.jpg" alt="Initial image">
    </div>

    <script>
        // Array containing our image paths
        const modelImages = ["girl-with-chopsticks.jpg", "coffee-shop.jpg"];

        const imgElement = document.getElementById('model-frame');

        // Preload the second image into the browser cache
        const preload = new Image();
        preload.src = modelImages[1];

        // Event: Mouse Enters the Image
        imgElement.addEventListener('mouseenter', () => {
            imgElement.src = modelImages[1];
        });

        // Event: Mouse Leaves the Image
        imgElement.addEventListener('mouseleave', () => {
            imgElement.src = modelImages[0];
        });
    </script>

</body>
</html>
